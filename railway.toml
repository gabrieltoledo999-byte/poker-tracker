[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
# Overrides the broken "npx drizzle-kit migrate" pre-deploy set via Railway UI.
# drizzle-kit is a devDependency and is NOT in the production bundle.
# Migrations run inside the server (runSafeMigrations) on startup.
# Railway accepts at most 1 element in preDeployCommand array.
preDeployCommand = ["true"]
