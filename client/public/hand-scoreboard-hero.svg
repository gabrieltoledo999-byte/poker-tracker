<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1120"/>
      <stop offset="0.45" stop-color="#1B1830"/>
      <stop offset="1" stop-color="#261018"/>
    </linearGradient>
    <radialGradient id="burst" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 165) rotate(90) scale(220 250)">
      <stop stop-color="#FFB703"/>
      <stop offset="0.45" stop-color="#FF6A00" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#FF6A00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leftPanel" x1="40" y1="0" x2="460" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E254D"/>
      <stop offset="1" stop-color="#1B4F9A"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="740" y1="0" x2="1160" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#77151A"/>
      <stop offset="1" stop-color="#C72A2A"/>
    </linearGradient>
    <linearGradient id="boardBase" x1="0" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E2232"/>
      <stop offset="1" stop-color="#0A0E18"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 900 72px 'Arial', sans-serif; letter-spacing: 1px; fill: #FFE082; }
      .small { font: 700 18px 'Arial', sans-serif; letter-spacing: 2px; fill: white; }
      .label { font: 900 34px 'Arial', sans-serif; letter-spacing: 1px; fill: white; }
    </style>
  </defs>

  <rect width="1200" height="700" rx="32" fill="url(#bg)"/>
  <circle cx="600" cy="170" r="190" fill="url(#burst)"/>

  <g opacity="0.85">
    <rect x="65" y="72" width="42" height="12" rx="4" transform="rotate(18 65 72)" fill="#FB8500"/>
    <rect x="180" y="38" width="48" height="10" rx="4" transform="rotate(-12 180 38)" fill="#219EBC"/>
    <rect x="285" y="90" width="40" height="12" rx="4" transform="rotate(23 285 90)" fill="#FFB703"/>
    <rect x="1010" y="58" width="45" height="12" rx="4" transform="rotate(22 1010 58)" fill="#FB8500"/>
    <rect x="1095" y="118" width="52" height="12" rx="4" transform="rotate(-27 1095 118)" fill="#8ECAE6"/>
    <rect x="885" y="96" width="36" height="10" rx="4" transform="rotate(-18 885 96)" fill="#FFB703"/>
    <rect x="126" y="156" width="32" height="10" rx="4" transform="rotate(-32 126 156)" fill="#8ECAE6"/>
    <rect x="1034" y="178" width="36" height="10" rx="4" transform="rotate(33 1034 178)" fill="#FB8500"/>
    <rect x="355" y="54" width="28" height="9" rx="4" transform="rotate(-24 355 54)" fill="#8ECAE6"/>
    <rect x="820" y="36" width="24" height="8" rx="4" transform="rotate(12 820 36)" fill="#FFB703"/>
