    <text x="28" y="64" font-family="Georgia, serif" font-size="78" font-weight="700" fill="#E63946">J</text>
    <text x="22" y="120" font-family="Georgia, serif" font-size="64" fill="#E63946">♦</text>
    <rect x="45" y="92" width="96" height="120" rx="16" fill="#EFE6D1" stroke="#141414" stroke-width="3"/>
    <circle cx="93" cy="134" r="34" fill="#F4D35E"/>
    <rect x="75" y="166" width="36" height="38" rx="10" fill="#24324C"/>
