    <rect x="18" y="18" width="122" height="82" rx="8" fill="#0B1020" opacity="0.85"/>
    <rect x="162" y="18" width="122" height="82" rx="8" fill="#1A2540" opacity="0.45"/>
    <rect x="306" y="18" width="122" height="82" rx="8" fill="#0B1020" opacity="0.85"/>
