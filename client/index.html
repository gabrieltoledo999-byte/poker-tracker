  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const analyticsEndpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const analyticsWebsiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
      const hasAnalyticsConfig =
        analyticsEndpoint &&
        analyticsWebsiteId &&
        !analyticsEndpoint.includes("VITE_ANALYTICS_ENDPOINT") &&
        !analyticsWebsiteId.includes("VITE_ANALYTICS_WEBSITE_ID");

      if (hasAnalyticsConfig) {
        const script = document.createElement("script");
        script.defer = true;
        script.src = `${analyticsEndpoint}/umami`;
        script.dataset.websiteId = analyticsWebsiteId;
        document.body.appendChild(script);
      }
    </script>
  </body>
